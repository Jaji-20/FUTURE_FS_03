<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      background:#0b0b0b;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    table {
      width:90%;
      margin:auto;
      border-collapse:collapse;
    }

    td,th {
      padding:10px;
      border-bottom:1px solid #333;
    }

    tr:hover {
      background:#222;
      transform:scale(1.01);
      transition:0.3s;
    }

    input {
      padding:5px;
      width:90%;
    }

    .delete {
      background:red;
      color:white;
    }

    .update {
      background:gold;
      color:black;
    }

    button {
      padding:5px 10px;
      border:none;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>Admin Dashboard</h2>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Service</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

<script>

async function loadBookings() {
  const res = await fetch("http://localhost:5000/bookings");
  const data = await res.json();

  const table = document.getElementById("table");
  table.innerHTML = "";

  data.forEach(item => {
    table.innerHTML += `
      <tr>
        <td><input value="${item.name}" id="name-${item._id}"></td>
        <td><input value="${item.phone}" id="phone-${item._id}"></td>
        <td>${item.service}</td>
        <td>
          <button class="update" onclick="updateBooking('${item._id}')">Update</button>
          <button class="delete" onclick="deleteBooking('${item._id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

// DELETE (INSTANT NO POPUP)
async function deleteBooking(id) {
  await fetch(`http://localhost:5000/booking/${id}`, {
    method: "DELETE"
  });
  loadBookings();
}

// UPDATE INLINE (NO PROMPT)
async function updateBooking(id) {
  const name = document.getElementById(`name-${id}`).value;
  const phone = document.getElementById(`phone-${id}`).value;

  await fetch(`http://localhost:5000/booking/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, phone })
  });

  loadBookings();
}

loadBookings();

</script>

</body>
</html>
